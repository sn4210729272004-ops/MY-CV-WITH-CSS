            max-width: 800px;

        }

            border-collapse: collapse;
            margin-top: 15px;
            background: #ffffff;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border: 1px solid #e0e0e0;
        }

        th {
            background-color: #3498db;

            font-weight: bold;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;

        }


        ul {
            padding-left: 20px;
        }

        li {
            margin-bottom: 8px;

        }


        footer {

            padding-top: 15px;

        }

        footer p {
            margin: 5px 0;
        }

        footer a {
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
